<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="description" content="ZYRON — A Força da Sua Evolução." />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-title" content="ZYRON" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- iOS Startup Images (Splash Screens) -->
    <link rel="apple-touch-startup-image" href="/images/zyron-512.png" />
    <link rel="apple-touch-icon" href="/images/zyron-192.png" />
    <link rel="icon" type="image/png" href="/images/zyron-192.png" />
    <title>ZYRON — A Força da Sua Evolução.</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('✅ Service Worker registrado com sucesso:', registration);
              
              // Verificar por updates imediatamente
              registration.update();
              
              // Escutar por updates
              registration.addEventListener('updatefound', () => {
                console.log('🔄 Nova versão do Service Worker encontrada!');
              });
            })
            .catch((error) => {
              console.error('❌ Falha ao registrar Service Worker:', error);
            });
        });
      } else {
        console.log('⚠️ Service Workers não são suportados neste navegador');
      }
    </script>
  </body>
</html>
