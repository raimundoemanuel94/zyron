    <!-- 🛡️ ZYRON ANTI-CRASH CORE -->
    <script>
      // Prevent fatal ReferenceError: GlobalPlayer is not defined in legacy bundles
      if (typeof window !== "undefined") {
        window.GlobalPlayer = window.GlobalPlayer || { status: 'RECOVERY' };
      }
    </script>

    <!-- ☢️ ZYRON NUCLEAR RECONSTRUCTION SCRIPT v4.0 -->
    <script>
      (function() {
        var flag = 'zyron_recovery_v4_0';
        if (!localStorage.getItem(flag)) {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              for (var i = 0; i < regs.length; i++) regs[i].unregister();
            });
          }
          if ('caches' in window) {
            caches.keys().then(function(ns) {
              for (var j = 0; j < ns.length; j++) caches.delete(ns[j]);
            });
          }
          localStorage.clear();
          localStorage.setItem(flag, 'YES');
          setTimeout(function() { window.location.replace('/'); }, 1500);
        }
      })();
    </script>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Bumping version for forced reload
          navigator.serviceWorker.register('/sw.js?v=nuclear_v3.0.1')
            .then((registration) => {
              console.log('✅ Service Worker registrado com sucesso:', registration);
              
              // Verificar por updates imediatamente
              registration.update();
              
              // Escutar por updates
              registration.addEventListener('updatefound', () => {
                console.log('🔄 Nova versão do Service Worker encontrada!');
              });
            })
            .catch((error) => {
              console.error('❌ Falha ao registrar Service Worker:', error);
            });
        });
      } else {
        console.log('⚠️ Service Workers não são suportados neste navegador');
      }
    </script>
